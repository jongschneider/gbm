version: "2"

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jschneider/tui_storybook

linters:
  enable:
    - cyclop
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - gocheckcompilerdirectives
    - gocritic
    - godot
    - govet
    - iface
    - intrange
    - modernize
    - nolintlint
    - perfsprint
    - predeclared
    - recvcheck
    - sloglint
    - staticcheck
    - tagalign
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unused
    - usestdlibvars
    - whitespace

  settings:
    cyclop:
      max-complexity: 15
      package-average: 5.0

    errcheck:
      check-type-assertions: false
      check-blank: true
      exclude-functions:
        - io.Copy
        - io.WriterTo.WriteTo

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    exhaustive:
      default-signifies-exhaustive: true


    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - whyNoLint # nolintlint handles this
        - unnamedResult
        - hugeParam # Too strict for struct parameters
        - rangeValCopy # Too strict, prefer clarity over micro-optimization
        - evalOrder # False positives in tea.Cmd returns
        - appendCombine # Style preference, keep separate appends for clarity
        - nestingReduce # Sometimes nesting is clearer
        - ifElseChain # Sometimes if-else is clearer than switch
        - singleCaseSwitch # Type switches with single case are idiomatic
        - filepathJoin # False positives in test strings

    godot:
      scope: toplevel
      period: true

    gosec:
      excludes:
        - G104 # Handled by errcheck
      config:
        global:
          nosec: true
          show-ignored: false

    govet:
      enable-all: true
      disable:
        - shadow # Too strict, shadows are common in Go
        - unusedwrite # False positives in test struct initialization

    grouper:
      const-require-single-const: false
      const-require-grouping: false
      import-require-single-import: false
      import-require-grouping: true
      var-require-single-var: false
      var-require-grouping: false

    iface:
      enable:
        - identical
        - unused
        - opaque

    nolintlint:
      require-explanation: true
      require-specific: true

    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    sloglint:
      no-mixed-args: true
      kv-only: false
      attr-only: false
      context: scope
      static-msg: false
      no-raw-keys: false
      key-naming-case: snake
      args-on-sep-lines: false

    staticcheck:
      checks:
        - all

    tagalign:
      align: true
      sort: true
      order:
        - json
        - yaml
        - xml
        - toml
        - mapstructure
        - validate
        - db

    testifylint:
      enable-all: true

    unparam:
      check-exported: false

    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: true

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-package-globs:
        - github.com/charmbracelet/*

  exclusions:
    paths:
      - deps
    rules:
      # Test files get some relaxed rules
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - goconst
          - gosec
          - wrapcheck

      # Main files can have init
      - path: main\.go
        linters:
          - gochecknoinits

      # Example files are more relaxed
      - path: example
        linters:
          - funlen
          - wrapcheck

