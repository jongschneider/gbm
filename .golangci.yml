version: "2"

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jschneider/tui_storybook

linters:
  enable:
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - funcorder
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - godot
    - gosec
    - govet
    - grouper
    - iface
    - inamedparam
    - intrange
    - ireturn
    - mnd
    - modernize
    - nestif
    - nilerr
    - nilnil
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - recvcheck
    - sloglint
    - staticcheck
    - tagalign
    - testifylint
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - whitespace
    - wrapcheck

  settings:
    cyclop:
      max-complexity: 15
      package-average: 5.0

    dupl:
      threshold: 150

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - io.Copy
        - io.WriterTo.WriteTo

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    exhaustive:
      default-signifies-exhaustive: true

    exhaustruct:
      exclude:
        # Common structs that are intentionally partially initialized
        - 'http\.Client'
        - 'http\.Server'
        - 'http\.Transport'
        - 'cobra\.Command'
        - 'tea\..*'
        - 'lipgloss\..*'

    funlen:
      lines: 80
      statements: 50
      ignore-comments: true

    goconst:
      min-len: 3
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
      disabled-checks:
        - whyNoLint # nolintlint handles this
        - unnamedResult

    godot:
      scope: toplevel
      period: true

    gosec:
      excludes:
        - G104 # Handled by errcheck
      config:
        global:
          nosec: true
          show-ignored: false

    govet:
      enable-all: true

    grouper:
      const-require-single-const: false
      const-require-grouping: false
      import-require-single-import: false
      import-require-grouping: true
      var-require-single-var: false
      var-require-grouping: false

    iface:
      enable:
        - identical
        - unused
        - opaque

    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - tea.Model
        - tea.Cmd

    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "10"
        - "100"
      ignored-functions:
        - 'strings\.SplitN'
        - make
        - 'time\.*'

    nestif:
      min-complexity: 5

    nolintlint:
      require-explanation: true
      require-specific: true

    paralleltest:
      ignore-missing: false
      ignore-missing-subtests: false

    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true

    prealloc:
      simple: true
      range-loops: true
      for-loops: false

    sloglint:
      no-mixed-args: true
      kv-only: false
      attr-only: false
      context: scope
      static-msg: false
      no-raw-keys: false
      key-naming-case: snake
      args-on-sep-lines: false

    staticcheck:
      checks:
        - all

    tagalign:
      align: true
      sort: true
      order:
        - json
        - yaml
        - xml
        - toml
        - mapstructure
        - validate
        - db

    testifylint:
      enable-all: true

    unparam:
      check-exported: false

    unused:
      field-writes-are-uses: true
      post-statements-are-reads: true
      exported-fields-are-used: true
      parameters-are-used: true
      local-variables-are-used: true
      generated-is-used: true

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-package-globs:
        - github.com/charmbracelet/*

  exclusions:
    rules:
      # Test files get some relaxed rules
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - goconst
          - gosec
          - exhaustruct
          - wrapcheck

      # Main files can have init
      - path: main\.go
        linters:
          - gochecknoinits

      # Example files are more relaxed
      - path: example
        linters:
          - exhaustruct
          - funlen
          - wrapcheck

